[build]
  command = "node scripts/build-netlify.mjs"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[[edge_functions]]
  path = "/"
  function = "oauth-root"

[[redirects]]
  from = "/runtime"
  to = "/.netlify/functions/runtime"
  status = 200

[[redirects]]
  from = "/metrics/summary"
  to = "/.netlify/functions/metrics-summary"
  status = 200

[[redirects]]
  from = "/metrics/recent-trades"
  to = "/.netlify/functions/metrics-recent-trades"
  status = 200

[[redirects]]
  from = "/settings/accounts"
  to = "/.netlify/functions/settings-accounts"
  status = 200

[[redirects]]
  from = "/me"
  to = "/.netlify/functions/me"
  status = 200

[[redirects]]
  from = "/me/auto-trade"
  to = "/.netlify/functions/me-auto-trade"
  status = 200

[[redirects]]
  from = "/me/logout"
  to = "/.netlify/functions/me-logout"
  status = 200

[[redirects]]
  from = "/oauth/start"
  to = "/.netlify/functions/oauth-start"
  status = 200

[[redirects]]
  from = "/oauth/callback"
  to = "/.netlify/functions/oauth-callback"
  status = 200
