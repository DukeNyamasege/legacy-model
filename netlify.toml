[build]
  command = "node scripts/build-netlify.mjs"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[[edge_functions]]
  path = "/"
  function = "oauth-root"

# OAuth callback redirect: if Deriv redirects back to the Netlify domain,
# forward the browser to the VPS backend so cookies are set on the VPS origin.
[[redirects]]
  from = "/oauth/callback"
  to = "/.netlify/functions/oauth-callback"
  status = 200

# OAuth start: redirect to the VPS backend's OAuth start endpoint.
[[redirects]]
  from = "/oauth/start"
  to = "/.netlify/functions/oauth-start"
  status = 200
