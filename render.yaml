databases:
  - name: underdog-bin22001-db
    databaseName: underdog_bin22001
    user: underdog
    plan: basic-256mb
    ipAllowList: []

services:
  - type: web
    name: underdog-bin22001-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    preDeployCommand: alembic upgrade head
    dockerCommand: uvicorn app.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/live
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: underdog-bin22001-db
          property: connectionString
      - key: DERIV_APP_ID
        sync: false
      - key: DERIV_OAUTH_CLIENT_ID
        value: 33MmAtDICSKcC7LAZj7JO
      - key: DERIV_OAUTH_REDIRECT_URL
        value: https://derivadmin.site/oauth/callback
      - key: CONTROL_API_KEY
        generateValue: true
      - key: DERIV_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_ORIGINS
        value: https://derivadmin.site,https://www.derivadmin.site
      - key: FRONTEND_ORIGIN_REGEX
        value: '^https://[a-z0-9-]+(?:--[a-z0-9-]+)?\.netlify\.app$'
      - key: CLIENT_SESSION_SAMESITE
        value: lax
      - key: TRADING_MODE
        value: demo
      - key: DERIV_ENVIRONMENT
        value: demo
      - key: ALLOW_REAL_TRADING
        value: "false"
      - key: TEST_RUN_ID
        value: bin22001
      - key: DEPLOYMENT_ID
        value: render-api

  - type: worker
    name: underdog-bin22001-worker
    runtime: docker
    plan: starter
    numInstances: 1
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m app.worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: underdog-bin22001-db
          property: connectionString
      - key: DERIV_APP_ID
        sync: false
      - key: DERIV_OAUTH_CLIENT_ID
        value: 33MmAtDICSKcC7LAZj7JO
      - key: DERIV_TOKEN
        sync: false
      - key: DERIV_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: DERIV_TRADING_ENABLED
        value: "true"
      - key: DERIV_ENVIRONMENT
        value: demo
      - key: TRADING_MODE
        value: demo
      - key: ALLOW_REAL_TRADING
        value: "false"
      - key: TEST_RUN_ID
        value: bin22001
      - key: DEPLOYMENT_ID
        value: render-worker
