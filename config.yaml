deriv:
  app_id: 33MmAtDICSKcC7LAZj7JO
  app_markup_percentage: 3.0
  environment: demo
  public_ws_url: wss://api.derivws.com/trading/v1/options/ws/public
  rest_base_url: https://api.derivws.com
  trading_enabled: true
  allow_real_trading: false
  production_acknowledgement: ''
  oauth_client_id: 33MmAtDICSKcC7LAZj7JO
  oauth_redirect_url: https://derivadmin.site/oauth/callback
  token_encryption_key: ''
model:
  name: The Underdog Legacy Model
  version: 2.1.0-bin22001
  brand: Father of Automation Series
  run_id: bin22001
files:
  tokens: tokens.txt
  state: bot_state.json
  users: users.json
logging:
  level: INFO
  file: trading_bot.log
strategy:
  symbol: 1HZ100V
  contract_type: DIGITOVER
  prediction: 2
  duration: 1
  duration_unit: t
  pattern_length: 3
  currency: USD
  initial_stake: 0.50
signal:
  trigger_name: BIN201x3
  pattern_ranges:
    - [6, 9]
    - [1, 2]
    - [3, 5]
  overlapping_signals_allowed: false
  require_pattern_reset: true
execution:
  reject_if_new_tick_arrives: false
  require_rising_ticks: true
  maximum_signal_age_ms: 2500
  maximum_proposal_age_ms: 900
bayesian:
  enabled: true
  mode: shadow
  prior_alpha: 3.0
  prior_beta: 2.0
  credible_interval: 0.95
  safety_margin_probability: 0.02
  minimum_completed_trades: 300
  minimum_probability_edge_confidence: 0.95
hmm:
  enabled: true
  mode: shadow
  minimum_training_ticks: 5000
  retrain_every_ticks: 1000
  favourable_state: MEAN_REVERSION
  minimum_favourable_state_probability: 0.70
cooldown:
  after_win_ticks: 1
  after_loss_ticks: 3
  after_three_consecutive_losses_ticks: 15
  after_five_consecutive_losses_ticks: 50
  require_pattern_reset: true
recovery:
  mode: two_run
  recovery_runs: 2
  debt_threshold: 0.50
  deep_debt_threshold: 2.00
  ladder_stakes: [0.50]
  maximum_stake: 1000.00
  regime_guard_enabled: false
  rolling_window_trades: 30
  pause_below_win_rate: 0.58
  resume_above_shadow_win_rate: 0.60
  shadow_min_samples: 20
  shadow_consecutive_wins_required: 0
  pause_after_consecutive_losses: 3
storage:
  database_url_env: DATABASE_URL
  local_database_url: sqlite:///data/bin22001.db
  export_directory: exports/bin22001
  database_required: true
trade:
  settle_wait_seconds: 3
  max_tick_silence_seconds: 45
  reconnect_delay_seconds: 10
